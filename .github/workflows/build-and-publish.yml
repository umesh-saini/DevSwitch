name: Build and Release

on:
  push:
    branches:
      - 'release/v*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'release/v*'
    types:
      - closed

jobs:
  build:
    name: Verify Build (Release Branch)
    # Run build when a PR is merged (closed and merged) into release/v*, or on direct push to release/v*
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/v')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Verify Electron Build
        run: npm run electron:build -- --dir # Builds without packaging to verify

  publish:
    name: Build and Publish Release
    # Run only when a version tag (v*) is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: write # Needed to create GitHub Releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- -p always
